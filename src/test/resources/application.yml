hibernate:
  dialect: org.hibernate.dialect.H2Dialect
  hbm2ddl:
    auto: create-drop
jdbc:
  driverClassName: org.h2.Driver
  url: jdbc:h2:mem:myDb;DB_CLOSE_DELAY=-1

spring:
  cache:
    jcache:
      config: classpath:ehcache.xml
  jackson:
    serialization:
      FAIL_ON_EMPTY_BEANS: false

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    open-in-view: false
  profiles:
    active: test
  sql:
    init:
      mode: always


payment:
  api:
    key: "SN_KEY_TEST_44785dfrt79SKFKF578"
    rate-limit:
      requests: 1000
      duration: 3600 # Durée en secondes (1 heure) pour la limite de requêtes API

  callback:
    timeout: 15s
    max-retries: 2
    retry-delay: 5s